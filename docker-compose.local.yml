# Local self-contained mode: Frontend + Backend + PostgreSQL
# Usage:
#   cp .env.local.example .env.local
#   docker compose -f docker-compose.local.yml --env-file .env.local up --build
#   docker compose -f docker-compose.local.yml --env-file .env.local down
#   docker compose -f docker-compose.local.yml --env-file .env.local down -v  (reset DB)

name: perleplade-local

services:

  # ─── Frontend (Nginx) ────────────────────────────────────────
  app:
    build:
      context: .
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:3001}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY:-unused}
        - VITE_SUPABASE_PROJECT_ID=${VITE_SUPABASE_PROJECT_ID:-local}
        - VITE_BACKEND_MODE=local
        - VITE_LOCAL_API_URL=
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_started

  # ─── Backend (Express/TypeScript) ────────────────────────────
  backend:
    build:
      context: ./server
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-perleplade}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
    depends_on:
      db:
        condition: service_healthy

  # ─── Database (PostgreSQL) ──────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-perleplade}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
